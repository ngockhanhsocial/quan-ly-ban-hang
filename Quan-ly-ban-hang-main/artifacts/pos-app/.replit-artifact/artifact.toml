kind = "web"
previewPath = "/"
title = "Quản Lý Bán Hàng Offline"
version = "1.0.0"
id = "artifacts/pos-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22570

[services.development]
run = "pnpm --filter @workspace/pos-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pos-app", "run", "build" ]
publicDir = "artifacts/pos-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22570"
BASE_PATH = "/"
